<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartStock - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e6efe7, #f8faf8, #ffffff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Background orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #66bb6a;
            top: -100px;
            left: -100px;
            opacity: 0.15;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #2e7d32;
            bottom: -50px;
            right: -50px;
            opacity: 0.12;
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(20, 60, 30, 0.08);
            border: 1px solid rgba(46, 125, 50, 0.15);
            position: relative;
            z-index: 10;
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            margin: 0 auto 15px;
        }

        .brand h2 {
            font-weight: 700;
            color: #1a2e1a;
        }

        .brand p {
            color: #6b8f6b;
            font-size: 0.85rem;
        }

        /* Labels */
        .form-label {
            color: #4a7a4a;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Inputs */
        .input-group-text {
            background: #f4f6f3;
            border: 1px solid #dce8dc;
            border-right: none;
            color: #2e7d32;
            border-radius: 10px 0 0 10px;
        }

        .form-control {
            background: #f9fbf9;
            border: 1px solid #dce8dc;
            border-left: none;
            border-radius: 0 10px 10px 0;
            color: #1a2e1a;
            padding: 12px 15px;
        }

        .form-control::placeholder {
            color: #9ab09a;
        }

        .form-control:focus {
            background: #fff;
            border-color: #2e7d32;
            box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.12);
            outline: none;
        }

        /* Button */
        .btn-login {
            background: linear-gradient(135deg, #2e7d32, #4caf50);
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 600;
            font-size: 0.95rem;
            width: 100%;
            color: #fff;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.25);
        }

        /* Alerts */
        .alert-danger {
            background: rgba(229, 115, 115, 0.08);
            border: 1px solid rgba(229, 115, 115, 0.2);
            border-radius: 10px;
            color: #c62828;
            font-size: 0.85rem;
        }

        .alert-success {
            background: rgba(46, 125, 50, 0.08);
            border: 1px solid rgba(46, 125, 50, 0.2);
            border-radius: 10px;
            color: #2e7d32;
            font-size: 0.85rem;
        }

        /* Footer */
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #7fa87f;
            font-size: 0.85rem;
        }

        .register-link a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-icon"><i class="fas fa-boxes-stacked"></i></div>
            <h2>SmartStock</h2>
            <p>Inventory & Product Management System</p>
        </div>


        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt me-2"></i> Login
            </button>
        </form>
        <div style="text-align: center; margin-top: 20px; color: #888; font-size: 0.9rem;">
             Don't have an account? <a href="/register/" style="color: #1a2e1a; text-decoration: none; font-weight: 600;">Register here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
